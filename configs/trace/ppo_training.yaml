# Faz 6: Trace-driven Training Configuration
# Target: 68-77% success rate (improvement from Phase 5: 62.4%)

training:
  algorithm: "PPO"
  version: "v3_trace"
  max_episodes: 500
  episodes_per_eval: 10
  
  # PPO hyperparameters (from Phase 5, validated)
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  
  # Batch configuration
  batch_size: 64
  n_steps: 2048  # Increased from Phase 5 for better stability
  n_epochs: 10
  
  # Early stopping
  patience: 50
  min_improvement: 0.005  # 0.5% improvement threshold

environment:
  # Trace-based environment
  trace_source: "synthetic_didi"  # or "real_traces" if available
  n_devices: 20
  n_tasks_per_episode: 50
  
  # State/Action/Reward (from Phase 5 ablation insights)
  use_reward_shaping: true        # CRITICAL (Phase 5: -62.4% impact)
  use_partial_offloading: true    # HIGH impact (Phase 5: -23.4%)
  use_semantic_features: true     # For explainability (minimal performance impact)
  use_confidence_weighting: false # Optional (Phase 5: +2.2% counter-intuitive)
  use_battery_awareness: true     # Retuned heuristic
  use_mobility_features: true     # Retuned heuristic
  use_queue_awareness: false      # Optional (Phase 5: +1.0% low impact)
  
  # Reward components (tuned for trace-driven scenario)
  reward_weights:
    latency: 1.0         # Base latency penalty
    energy: 0.5          # Energy efficiency bonus
    priority: 2.0        # High-priority task completion reward
    deadline: 3.0        # Deadline meet bonus (semantic reward shaping)
    fairness: 0.5        # Queue fairness penalty

evaluation:
  # Validation/test metrics
  success_rate_target: 0.68  # 68% minimum success rate
  metrics:
    - "success_rate"
    - "avg_latency"
    - "deadline_miss_rate"
    - "energy_efficiency"
    - "priority_satisfaction"
  
  # Checkpoint management
  save_best: true
  save_frequency: 50  # Save every 50 episodes

data:
  # Trace data configuration
  trace_dir: "data/traces"
  train_episodes: 400
  val_episodes: 50
  test_episodes: 50
  
  # Preprocessing
  normalize_features: true
  remove_outliers: true
  
  # Reproducibility
  seed: 42

# Phase 5 to Phase 6 Transition
# Key learnings from ablation study that inform Faz 6:
# 1. Reward shaping is FOUNDATIONAL - always enabled
# 2. Partial offloading provides crucial flexibility - 6 discrete actions
# 3. LLM semantic features: good for explainability, minimal performance impact
# 4. Battery/Mobility: re-tune heuristics (counter-intuitive positive deltas)
# 5. Focus: Real trace data should help model learn realistic task distributions

logging:
  log_dir: "results/raw/trace_training"
  tensorboard: true
  checkpoint_dir: "models/ppo/trace_training"
  report_path: "phase_reports/Phase_6_Report.md"
  
device:
  cuda: true
  device_id: 0
