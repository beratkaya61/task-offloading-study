# Ablation Study Configuration (Faz 5) - Ablation Çalışması Yapılandırması
# Semantic components' contribution - Semantic bileşenlerin kontribüsyon analizi

ablation_studies:
  # Full Model (Baseline - tüm bileşenler etkinleştirildi)
  full_model:
    name: "Full Model (with all semantic features)"
    enabled_features:
      semantics: true
      reward_shaping: true
      semantic_prior: true
      confidence_weighting: true
      partial_offloading: true
      battery_awareness: true
      queue_awareness: true
      mobility_features: true
    description: "Complete system with all LLM semantic prior, confidence, and reward shaping"
    expected_performance: "~62% success (baseline from Phase 4)"

  # Without Semantics - Semantic analiz olmadan
  w_o_semantics:
    name: "Without LLM Semantic Analysis"
    enabled_features:
      semantics: false
      reward_shaping: true
      semantic_prior: false
      confidence_weighting: false
      partial_offloading: true
      battery_awareness: true
      queue_awareness: true
      mobility_features: true
    description: "PPO_v2 without LLM semantic input, prior, or confidence"
    expected_drop: "~5-15% (LLM contribution)"

  # Without Reward Shaping - Reward şekillendirmesi olmadan
  w_o_reward_shaping:
    name: "Without Semantic Reward Shaping"
    enabled_features:
      semantics: true
      reward_shaping: false
      semantic_prior: true
      confidence_weighting: true
      partial_offloading: true
      battery_awareness: true
      queue_awareness: true
      mobility_features: true
    description: "No LLM-based reward bonus/penalty feedback"
    expected_drop: "~3-8% (reward shaping contribution)"

  # Without Semantic Prior - Semantic prior olmadan
  w_o_semantic_prior:
    name: "Without Semantic Prior (Policy Bias)"
    enabled_features:
      semantics: true
      reward_shaping: true
      semantic_prior: false
      confidence_weighting: true
      partial_offloading: true
      battery_awareness: true
      queue_awareness: true
      mobility_features: true
    description: "No LLM action probability prior biasing"
    expected_drop: "~2-5% (prior contribution)"

  # Without Confidence Weighting - Güven ağırlıklandırması olmadan
  w_o_confidence:
    name: "Without LLM Confidence Weighting"
    enabled_features:
      semantics: true
      reward_shaping: true
      semantic_prior: true
      confidence_weighting: false
      partial_offloading: true
      battery_awareness: true
      queue_awareness: true
      mobility_features: true
    description: "Uniform confidence weight (all 1.0) regardless of semantic confidence"
    expected_drop: "~1-3% (confidence calibration)"

  # Without Partial Offloading - Kısmi offloading olmadan
  w_o_partial_offloading:
    name: "Without Partial Offloading (Local/Edge/Cloud only)"
    enabled_features:
      semantics: true
      reward_shaping: true
      semantic_prior: true
      confidence_weighting: true
      partial_offloading: false # Only 0 (Local), 4 (Edge), 5 (Cloud)
      battery_awareness: true
      queue_awareness: true
      mobility_features: true
    description: "Discrete targets only (Local, Edge, Cloud) - no split offloading"
    expected_drop: "~10-20% (partial offloading utility)"

  # Without Battery Awareness - Pil farkındalığı olmadan
  w_o_battery_awareness:
    name: "Without Battery Awareness"
    enabled_features:
      semantics: true
      reward_shaping: true
      semantic_prior: true
      confidence_weighting: true
      partial_offloading: true
      battery_awareness: false
      queue_awareness: true
      mobility_features: true
    description: "State doesn't include battery level; reward ignores battery drain"
    expected_drop: "~5-10% (battery impact on mobile devices)"

  # Without Queue Awareness - Kuyruk farkındalığı olmadan
  w_o_queue_awareness:
    name: "Without Server Queue Awareness"
    enabled_features:
      semantics: true
      reward_shaping: true
      semantic_prior: true
      confidence_weighting: true
      partial_offloading: true
      battery_awareness: true
      queue_awareness: false
      mobility_features: true
    description: "State doesn't reflect edge/cloud server queue lengths"
    expected_drop: "~3-8% (queue congestion avoidance)"

  # Without Mobility Features - Mobilite özellikleri olmadan
  w_o_mobility_features:
    name: "Without Mobility & Distance Features"
    enabled_features:
      semantics: true
      reward_shaping: true
      semantic_prior: true
      confidence_weighting: true
      partial_offloading: true
      battery_awareness: true
      queue_awareness: true
      mobility_features: false
    description: "Edge proximity/distance not in state; no mobility prediction"
    expected_drop: "~2-5% (mobility-aware offloading)"

# Experimental parameters
experiment:
  mode: "evaluation"
  num_episodes_per_ablation: 25 # Increased for statistical significance and calibration verification
  seed: 42
  seeds: [42, 43, 44]
  max_steps: 50
  evaluation_model_path_template: "models/ppo/phase5_baseline_retraining/seed{seed}.zip"
  deterministic: true
  confidence_interval: 0.95 # 95% CI for results

retraining:
  base_config: "configs/synthetic_rl_training.yaml"
  seeds: [42, 43, 44]
  total_timesteps: 30000
  eval_episodes: 10
  model_root: "models/ppo/phase5_ablation_retraining"

# Output configuration
output:
  results_dir: "results/ablation"
  table_path: "results/tables/offloading_experiment_report.md"
  plot_path: "results/figures/ablation_impact.png"
  csv_path: "results/raw/ablation_experiments.csv"

# Metrics to collect
metrics:
  - metric_success_rate # % of successful task completions
  - metric_avg_reward # Mean cumulative reward
  - metric_avg_latency # Average task latency (ms)
  - metric_p95_latency # 95th percentile latency (ms)
  - metric_deadline_miss_ratio # % of missed deadlines
  - metric_avg_energy # Average energy consumption (J)
  - metric_fairness_score # Fairness across devices
  - metric_jitter # Latency variation (std dev)
  - metric_qoe # Quality of Experience score

# Analysis output format
analysis_format:
  table_columns:
    - Ablation
    - Success_Rate_%
    - Avg_Reward
    - Avg_Latency_ms
    - P95_Latency_ms
    - Deadline_Miss_%
    - Fairness_Score
    - Delta_vs_Full_%

  chart_types:
    - bar_chart_success_rate
    - bar_chart_reward
    - line_chart_latency
    - heatmap_metric_comparison
