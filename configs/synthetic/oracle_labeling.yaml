seed: 42

objectives:
  - "latency_oracle"
  - "energy_oracle"
  - "weighted_objective_oracle"
  - "reward_aligned_oracle"

env:
  max_steps: 50
  num_edge_servers: 3
  num_devices: 5

dataset:
  n_episodes: 60
  train_ratio: 0.7
  val_ratio: 0.15

scoring:
  delay_weight: 0.46
  energy_weight: 0.14
  deadline_weight: 0.16
  cloud_weight: 0.18
  battery_weight: 0.04
  edge_risk_weight: 0.02
  cloud_penalty: 0.85
  partial_bonus: 0.22
  edge_semantic_bonus: 0.18
  local_semantic_bonus: 0.12
  semantic_match_bonus: 0.12
  semantic_mismatch_penalty: 0.08
  local_large_task_penalty: 0.22
  full_edge_penalty: 0.05

output:
  csv_path: "results/raw/synthetic/pretraining/oracle_label_dataset.csv"
  report_path: "v2_docs/phase_7/synthetic_oracle_label_summary.md"

