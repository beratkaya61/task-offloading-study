training:
  base_config: configs/synthetic/rl_training.yaml
  seeds:
  - 42
  - 43
  - 44
  total_timesteps: 30000
  eval_episodes: 10
  eval_interval_steps: 5000
  progress_eval_episodes: 5
  scratch_overrides: {}
  pretrained_overrides: {}
  pretrained_schedule:
    enabled: true
    phases:
    - name: retention
      timesteps: 10000
      hyperparam_overrides:
        learning_rate: 5.0e-05
      anchor_config:
        enabled: true
        dataset_path: results/raw/synthetic/pretraining/oracle_label_dataset.csv
        teacher_policy: teacher_contextual_reward_aligned
        min_margin: 0.0
        batch_size: 128
        balance_actions: true
        balance_power: 0.75
        samples_per_epoch: 4096
        interval_steps: 2500
        until_step: 10000
        batches_per_round: 2
        loss_weight: 0.15
    - name: refinement
      timesteps: 20000
      hyperparam_overrides:
        learning_rate: 0.00015
      anchor_config:
        enabled: true
        dataset_path: results/raw/synthetic/pretraining/oracle_label_dataset.csv
        teacher_policy: teacher_contextual_reward_aligned
        min_margin: 0.0
        batch_size: 128
        allowed_actions:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        balance_actions: true
        balance_power: 0.75
        samples_per_epoch: 4096
        interval_steps: 5000
        until_step: 20000
        batches_per_round: 1
        loss_weight: 0.04
pretraining:
  checkpoint_path: models/ppo/teacher_policy_pretrained/contextual_reward_aligned/ppo_pretrained.zip
anchoring:
  enabled: false
output:
  model_root: models/ppo/teacher_policy_sensitivity/contextual_reward_aligned
  final_csv: results/raw/synthetic/teacher_policy_sensitivity/contextual_reward_aligned/staged_training_comparison.csv
  progress_csv: results/raw/synthetic/teacher_policy_sensitivity/contextual_reward_aligned/staged_training_progress.csv
  report_path: null
