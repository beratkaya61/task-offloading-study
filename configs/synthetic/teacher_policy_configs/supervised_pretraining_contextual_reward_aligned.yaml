dataset:
  balance_actions: true
  balance_power: 0.75
  csv_path: results/raw/synthetic/pretraining/oracle_label_dataset.csv
  min_margin: 0.0
  samples_per_epoch: 4096
  teacher_policy: teacher_contextual_reward_aligned
env:
  max_steps: 50
  num_devices: 5
  num_edge_servers: 3
output:
  checkpoint_path: models/ppo/teacher_policy_pretrained/contextual_reward_aligned/ppo_pretrained
  metrics_csv: results/raw/synthetic/teacher_policy_sensitivity/contextual_reward_aligned/supervised_pretraining_metrics.csv
  report_path: null
ppo:
  batch_size: 64
  device: cpu
  gamma: 0.99
  learning_rate: 0.0003
  n_epochs: 10
  n_steps: 512
seed: 42
training:
  batch_size: 128
  early_stopping_min_delta: 0.0001
  early_stopping_patience: 5
  epochs: 30
  learning_rate: 0.001
